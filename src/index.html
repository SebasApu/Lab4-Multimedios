<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LAB4 - Responsive Layouts</title>
  <link rel="stylesheet" href="assets/css/global.css">
  <link rel="stylesheet" href="assets/css/modules/layouts.css">
</head>
<body>

  <!-- Layout 1: Holy Grail -->
  <section class="section">
    <h2 class="section-title">Layout 1 — Holy Grail</h2>
    <div class="layout1">
      <header class="box l1-header">header</header>
      <nav class="box l1-nav">nav</nav>
      <article class="box l1-article">article</article>
      <aside class="box l1-aside">aside</aside>
      <footer class="box l1-footer">footer</footer>
    </div>
  </section>

  <!-- Layout 2: Fixture SA -->
  <section class="section">
    <h2 class="section-title">Layout 2 — Fixture SA</h2>
    <div class="layout2">
      <header class="box l2-titulo">Fixture SA</header>
      <div class="box l2-a">A</div>
      <div class="box l2-b">B</div>
      <div class="box l2-c">C</div>
      <div class="box l2-d">D</div>
      <div class="box l2-e">E</div>
    </div>
  </section>

</body>
</html>
